<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours - Trinexta</title>
    <style>
        :root {
            --primary: #0a233e;
            --secondary: #5c92b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #ffffff;
            padding: 24px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .wordmark {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.08em;
            margin-bottom: 40px;
        }

        .wordmark span {
            color: var(--secondary);
        }

        .icon {
            margin: 0 auto 32px;
            width: 72px;
            height: 72px;
        }

        .icon circle {
            fill: none;
            stroke: var(--secondary);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 140 200;
            animation: spin 1.8s linear infinite;
            transform-origin: center;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="wordmark">TRINEX<span>TA</span></div>
        <svg class="icon" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
            <circle cx="36" cy="36" r="30"></circle>
        </svg>
        <h1>Nous revenons très bientôt</h1>
        <p>Une opération de maintenance est en cours sur nos serveurs. Le site sera de nouveau disponible dans quelques
            instants.</p>
        <div class="footer">Trinexta - Infogerance et solutions informatiques</div>
    </div>
</body>

</html>
