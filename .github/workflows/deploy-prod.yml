name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID || secrets.NEXT_PUBLIC_GTM_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_GTM_ID
          script: |
            set -e
            cd /var/www/trinexta-prod
            git pull origin main
            npm ci
            npx prisma migrate deploy
            npx prisma generate
            : "${NEXT_PUBLIC_GTM_ID:?NEXT_PUBLIC_GTM_ID is missing in GitHub Actions variables or secrets}"
            npm run build
            pm2 startOrReload ecosystem.config.js --only trinexta-prod --update-env
            pm2 save
