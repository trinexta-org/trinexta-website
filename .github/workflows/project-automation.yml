name: Project automation

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:

jobs:
  move-linked-issues-to-review:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to "En revue"
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Extract issue numbers from PR body (Closes/Fixes/Resolves #N)
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiP '(?:closes|fixes|resolves)\s+#\K\d+' || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No linked issues found in PR body."
            exit 0
          fi

          PROJECT_ID="PVT_kwDOEMKgnc4BW2bg"
          FIELD_ID="PVTSSF_lADOEMKgnc4BW2bgzhSHb5A"
          OPTION_ID="df73e18b"

          for ISSUE_NUMBER in $ISSUE_NUMBERS; do
            echo "Processing issue #$ISSUE_NUMBER"

            # Get issue node ID
            ISSUE_NODE_ID=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) { id }
                }
              }' -f owner="$REPO_OWNER" -f repo="$REPO_NAME" -F number="$ISSUE_NUMBER" \
              --jq '.data.repository.issue.id')

            if [ -z "$ISSUE_NODE_ID" ]; then
              echo "Issue #$ISSUE_NUMBER not found, skipping."
              continue
            fi

            # Get the project item ID for this issue
            ITEM_ID=$(gh api graphql -f query='
              query($projectId: ID!, $cursor: String) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100, after: $cursor) {
                      nodes {
                        id
                        content { ... on Issue { id } }
                      }
                    }
                  }
                }
              }' -f projectId="$PROJECT_ID" \
              | jq -r --arg issueId "$ISSUE_NODE_ID" \
              '.data.node.items.nodes[] | select(.content.id == $issueId) | .id')

            if [ -z "$ITEM_ID" ]; then
              echo "Issue #$ISSUE_NUMBER not found in project, skipping."
              continue
            fi

            # Update status to "En revue"
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }' \
              -f projectId="$PROJECT_ID" \
              -f itemId="$ITEM_ID" \
              -f fieldId="$FIELD_ID" \
              -f optionId="$OPTION_ID"

            echo "Issue #$ISSUE_NUMBER moved to En revue."
          done
